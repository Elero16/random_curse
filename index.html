<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проклянатор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Шаг 1: Стартовая страница -->
        <div id="step-start" class="form-step active">
            <div class="logo-symbol">◈</div>
            <h1>Проклянатор</h1>
            <p class="tagline">Проклятия<br>для сложных людей</p>

            <div class="divider"></div>

            <button class="btn" id="btn-start">
                НАЧАТЬ ПРОКЛИНАТЬ
            </button>
            <span class="hint-text">Астрал подключён • Конфиденциально</span>
        </div>

        <!-- Шаг 2: Форма проклятия -->
        <div id="step-form" class="form-step">
            <div class="logo-symbol small">◈</div>
            <h2>Новое проклятие</h2>
            <p class="tagline">Заполните поля — и да свершится возмездие</p>

            <div class="divider"></div>

            <div class="form-group">
                <label for="target-name">Имя жертвы</label>
                <input type="text" id="target-name" placeholder="Иван Иванов" maxlength="100">
                <span class="error-hint" id="error-name"></span>
            </div>

            <div class="form-group">
                <label for="target-position">Должность</label>
                <input type="text" id="target-position" placeholder="Менеджер по разочарованиям" maxlength="100">
                <span class="error-hint" id="error-position"></span>
            </div>

            <div class="form-group">
                <label for="target-workplace">Место работы</label>
                <input type="text" id="target-workplace" placeholder="ООО «Надежда и крах»" maxlength="150">
                <span class="error-hint" id="error-workplace"></span>
            </div>

            <div class="form-group">
                <label for="target-crime">Что сделал(а)</label>
                <textarea id="target-crime" placeholder="Расскажите о проступке — астрал запротоколирует..." maxlength="500"></textarea>
                <span class="error-hint" id="error-crime"></span>
                <small class="char-counter" id="counter-crime">0 / 500</small>
            </div>

            <div class="form-group">
                <label for="curse-text">какую кару хотите наслать</label>
                <textarea id="curse-text" placeholder="Сформулируйте проклятие — чётко и по делу..." maxlength="500"></textarea>
                <span class="error-hint" id="error-curse"></span>
                <small class="char-counter" id="counter-curse">0 / 500</small>
            </div>

            <div class="form-group">
                <label for="curse-duration">Срок</label>
                <select id="curse-duration">
                    <option value="неделя">Неделя</option>
                    <option value="месяц">Месяц</option>
                    <option value="год">Год</option>
                    <option value="несколько лет">Несколько лет</option>
                    <option value="до скончания веков">До скончания веков</option>
                </select>
            </div>

            <div class="button-row">
                <button class="btn" id="btn-cast">
                    ПРОКЛЯНУТЬ
                </button>
                <button class="btn btn-ghost" id="btn-back">
                    ← Назад
                </button>
            </div>
        </div>

        <!-- Шаг 3: Результат -->
        <div id="step-result" class="form-step">
            <div class="logo-symbol small success">✓</div>
            <h2 id="result-text">Готово</h2>
            <p class="tagline" id="result-subtitle">Проклятие доставлено по назначению</p>

            <div class="divider"></div>

            <div id="curse-summary" class="summary-block">
                <!-- Заполняется через JS -->
            </div>

            <button class="btn btn-ghost" id="btn-new-curse" style="margin-top: 25px;">
                НАСЛАТЬ НОВОЕ ПРОКЛЯТИЕ
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
